background_narrative: Derek works at a 30-person B2B SaaS startup in Amsterdam where
  he wears multiple hats — shipping product features by day and maintaining the internal
  tooling stack by night. He's blunt in Slack, opinionated in code reviews, and has
  a low tolerance for tools that look pretty but break under real-world conditions.
  He's been burned before by form builders that couldn't handle branching logic beyond
  two levels, and he keeps a running Notion doc of "tools we tried and why we ditched
  them."

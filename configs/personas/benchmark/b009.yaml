background_narrative: Daniel runs a small logistics tech startup in Warsaw, Poland,
  where he juggles product decisions with day-to-day operations. He's methodical rather
  than impulsive — he prefers reading documentation over watching tutorial videos,
  and tends to stick with tools once they work well enough, even if something shinier
  is available. Not particularly code-savvy, he relies on no-code tools for most internal
  processes, but gets frustrated quickly when setup takes longer than he expects or
  when pricing tiers feel designed to trap him.

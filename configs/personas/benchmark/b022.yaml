background_narrative: Camille works at a 30-person B2B SaaS startup in Lyon, France,
  where she's the sole marketer responsible for demand gen, email campaigns, and conversion
  optimization. She's comfortable stitching together tools via Zapier and has a solid
  grasp of UTM tracking and funnel analytics, but has no engineering support — everything
  she builds has to be something she can own and iterate on herself. She's methodical
  about documentation and tends to test two or three tools before committing, but
  once she picks something she sticks with it.

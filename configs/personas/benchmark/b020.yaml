background_narrative: 암스테르담 출신으로 현재 베를린 소재 소규모 데이터 인프라 스타트업에서 일한다. 팀 내 유일한 백엔드 엔지니어로,
  고객사 데이터를 수집·정제·전달하는 파이프라인을 혼자 설계하고 유지한다. 문서화와 자동화에 집착에 가까운 기준을 갖고 있으며, '내가 직접 만들면
  확실하다'는 믿음이 강해 외부 툴에 회의적이지만, 기술적으로 설계가 탄탄하다고 판단하면 빠르게 수용한다.

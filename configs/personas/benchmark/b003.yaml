background_narrative: 프랑스 리옹을 기반으로 혼자 운영하는 1인 사진 스튜디오의 주인으로, 필름 사진과 시각 문화를 주제로 한 뉴스레터를
  간헐적으로 발행하고 있다. 디자인 감각이 있어 Canva로 SNS 콘텐츠를 직접 만들고 새 도구를 발견하면 즉시 시도해보는 편이지만, 한 도구에
  오래 정착하지 못하고 워크플로우가 들쭉날쭉하다. 혼자 모든 비용을 감당하다 보니 월 구독료에 민감하고, 무료 티어로 충분히 해결할 수 없다는 확신이
  생기기 전까지는 결제를 미루는 경향이 있다.

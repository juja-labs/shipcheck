background_narrative: Marcus는 마이애미에서 야외 그룹 부트캠프와 HIIT 세션을 운영하며, 20~30명 규모의 단골 클라이언트
  커뮤니티를 Instagram Stories와 WhatsApp 단체방으로 관리한다. 스마트폰과 웹 도구를 충분히 다룰 수 있지만 계획을 세우기보다는
  직감적으로 결정하는 편이라, 등록 취합이나 참석자 관리 같은 행정 작업은 늘 마지막 순간으로 미뤄진다. 클라이언트들과 직접 몸으로 부대끼는 걸
  좋아하고 에너지가 넘치는 반면, 스프레드시트 앞에 앉아 있는 시간은 최대한 줄이고 싶어 한다.

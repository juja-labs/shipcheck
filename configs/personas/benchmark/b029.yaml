background_narrative: Marcus는 영국 맨체스터 출신으로, 두 번째 스타트업을 운영 중인 시리얼 파운더다. 첫 번째 회사를 엑싯한
  경험이 있어 제품보다 '돈이 되는 구조'에 훨씬 예민하다. 노션과 슬랙을 주력으로 쓰지만 새 도구를 도입할 때는 ROI가 즉시 보이지 않으면 빠르게
  포기하는 편이고, 팀원에게 도구 교체를 강하게 밀어붙이는 스타일이라 종종 마찰이 생긴다. 기술적으로 기본은 알지만 직접 코딩은 안 하고, 'no-code면
  다 된다'는 생각으로 스택을 짜왔다.

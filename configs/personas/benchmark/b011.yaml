background_narrative: Dara는 3년 전 시카고의 마케팅 대행사를 그만두고 자신의 회복 경험을 바탕으로 소브리어티 코칭을 시작했으며,
  현재 포틀랜드에서 원격으로 약 10명의 클라이언트를 관리하고 있다. 새로운 앱과 워크플로 도구를 탐색하는 것을 즐기고—한 번은 Notion 템플릿을
  이틀 동안 파고든 적도 있다—하지만 유료 구독으로 이어지는 경우는 거의 없으며, '지금 쓰는 것'이 한계에 부딪혀야 비로소 대안을 진지하게 찾는다.
  인스타그램 DM과 Linktree로 신규 문의를 받고 있지만, 진지하지 않은 잠재 클라이언트를 걸러낼 방법이 없어 디스커버리 콜 전 사전 정보를
  받을 수 있는 폼이 필요해졌다.

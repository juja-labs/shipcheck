background_narrative: Daniel은 핀테크 스타트업(직원 약 35명)에서 내부 툴링과 백오피스 시스템을 전담하는 풀스택 개발자다.
  기존 폼 빌더로 고객 서포트 폼을 운영해왔지만 브랜딩 제약과 API 연동 과정의 번거로움에 더 나은 대안을 주기적으로 탐색한다.
  새로운 기술을 빠르게 흡수하는 편이지만 과도한 설정 오버헤드를 싫어하고, '작동하면 됐다'는 실용주의적 태도로 도구를 평가한다.

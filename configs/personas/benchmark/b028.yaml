background_narrative: 상파울루 출신의 소프트웨어 엔지니어 겸 창업자로, 라틴아메리카 중소기업 대상 채용 자동화 SaaS를 운영한다.
  Notion으로 사업 전체를 관리하고 Zapier 워크플로우를 직접 짜는 등 자동화 도구에 익숙하며, 무엇이든 직접 해보고 '작동하면 스케일'하는
  방식을 선호한다. 팀이 7명뿐이라 모든 도구 구독은 ROI 스프레드시트로 검토하고, 무료 티어로 먼저 한계까지 써보는 것이 철칙이다.

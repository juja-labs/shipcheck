background_narrative: 우크라이나 출신으로 독일 뮌헨에 정착해 저소득 이주민 아동 대상 방과후 교육 프로그램을 운영 중이다. 업무의
  절반은 보조금 신청서 작성과 학부모 소통인데, Excel과 Google 도구 정도는 쓰지만 새 서비스를 익히는 데 시간이 걸리고 '내가 잘못 설정한
  건 아닐까' 하는 걱정이 늘 앞선다. 연간 운영 예산이 빠듯해 유료 도구 구독은 이사회 승인이 필요한 구조라 개인 카드로도, 조직 예산으로도 SaaS
  비용을 쓰는 것 자체가 심리적 장벽이다.

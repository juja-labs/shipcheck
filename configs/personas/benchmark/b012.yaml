background_narrative: Nadia는 로테르담에서 혼자 운영하는 온라인 마인드셋 코칭 비즈니스로, 번아웃을 겪는 중간 관리자들을 타겟으로
  한다. 이메일 뉴스레터·Canva·소셜 예약 툴 정도가 그녀의 '안전한 도구 스택'이고, 새 툴을 온보딩할 때는 처음 몇 단계가 조금만 불분명해도
  '내가 뭔가 망치고 있는 건 아닐까' 불안이 치솟아 절반쯤에서 탭을 닫는 패턴이 반복된다. 클라이언트 파이프라인 전부를 인스타그램에서 홍보하는
  리드 퀴즈 하나에 의존하다 보니, 그 퀴즈가 '충분히 프리미엄해 보이는가'를 지속적으로 걱정하며 같은 랜딩 페이지를 몇 번이고 다시 들여다본다.

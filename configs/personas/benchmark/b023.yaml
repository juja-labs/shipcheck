background_narrative: Simone is a Rotterdam-based freelance photographer who shoots
  lifestyle and portrait work while sharing behind-the-scenes content to 28K Instagram
  followers and a growing YouTube channel — all managed entirely solo with no assistant
  or agency. She's vocal online and doesn't hold back when software wastes her time
  or hides basic features behind a paywall; her community knows her as someone who
  tells it like it is. While she's comfortable with tools she's relied on for years,
  she tends to shut down fast when setup looks complicated, and quickly loses patience
  if the first five minutes don't feel intuitive.

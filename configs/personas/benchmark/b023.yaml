  primary_goal: Ahead of her Lightroom preset pack launch next month, place a branded
    email subscription form on her website homepage and Instagram link-in-bio page
    to convert interested followers into a direct list she owns — so she's not depending
    on the algorithm to reach people on launch day.
  prior_tools:
  - Google Forms
  - Typeform
  - Canva
  success_criterion: The form is live and collecting real signups within 30 minutes
    of starting, looks clean and on-brand on mobile without extra CSS work, and stays
    fully functional on a free plan past the first 100 responses.

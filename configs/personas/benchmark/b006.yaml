background_narrative: 호주 멜버른에서 소규모 비즈니스 창업자와 코치들을 대상으로 브랜드 포토그래피를 하는 1인 프리랜서다. 인스타그램과
  오프라인 네트워킹으로 클라이언트를 유치하며, 직설적이고 에너지 넘치는 성격 덕에 입소문은 빠르지만 예산 맞지 않는 문의가 많아 통화 낭비가 잦다.
  Canva로 견적서와 패키지 안내자료를 만들고, Google Forms로 문의를 받고 있지만 폼 디자인이 촌스럽다는 걸 알면서도 개선할 기술적
  여유나 지식이 없어 불만이 쌓여 있다.

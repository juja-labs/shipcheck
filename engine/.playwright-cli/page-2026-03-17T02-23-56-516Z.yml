      - generic [ref=e73]:
        - generic [ref=e74]:
          - generic [ref=e75]: "Summary: Users ages 65 and older face unique challenges when using websites and apps. Digital literacy among this demographic is rising, but designs need to accommodate older users."
          - generic [ref=e76]:
            - generic [ref=e78]:
              - heading "In This Article:" [level=2] [ref=e81]
              - list [ref=e82]:
                - listitem [ref=e83]:
                  - link "Why Design for Older Adults?" [ref=e84] [cursor=pointer]:
                    - /url: "#toc-why-design-for-older-adults-1"
                - listitem [ref=e85]:
                  - link "Research Program" [ref=e86] [cursor=pointer]:
                    - /url: "#toc-research-program-2"
                - listitem [ref=e87]:
                  - link "Defining “Older Adult”" [ref=e88] [cursor=pointer]:
                    - /url: "#toc-defining-older-adult-3"
                - listitem [ref=e89]:
                  - link "Changes Over Time" [ref=e90] [cursor=pointer]:
                    - /url: "#toc-changes-over-time-4"
                - listitem [ref=e91]:
                  - link "Usability Challenges for Older Users" [ref=e92] [cursor=pointer]:
                    - /url: "#toc-usability-challenges-for-older-users-5"
                - listitem [ref=e93]:
                  - link "Full Research Report" [ref=e94] [cursor=pointer]:
                    - /url: "#toc-full-research-report-6"
            - heading "Why Design for Older Adults?" [level=2] [ref=e95]
            - paragraph [ref=e96]:
              - text: In many wealthy countries, people aged over 65 are the fastest growing demographic. As a global society we are living longer and remaining active later in life. According to
              - link "a study conducted by the Pew Research Institute" [ref=e97] [cursor=pointer]:
                - /url: https://www.pewinternet.org/fact-sheet/internet-broadband/
              - text: ", in 2019 73% of people over the age of 65 were connected to the internet. The US Census Bureau reports that people over the age of 65 have the highest"
              - link "household wealth" [ref=e98] [cursor=pointer]:
                - /url: https://www.census.gov/prod/2012pubs/p60-243.pdf
              - text: of any age group.
            - paragraph [ref=e99]:
              - text: Digital products often fail this growing and wealthy demographic. As
              - link "Don Norman observed" [ref=e100] [cursor=pointer]:
                - /url: https://www.fastcompany.com/90338379/i-wrote-the-book-on-user-friendly-design-what-i-see-today-horrifies-me
              - text: ", bad design abounds, in both physical and digital products. Current interaction designs often feature illegible text, tiny targets, startling sounds, and other features that make the online world unfriendly to older users."
            - paragraph [ref=e101]: Our recent research explores how older adults use technology and offers recommendations on how digital products can be improved to meet their needs.
            - heading "Research Program" [level=2] [ref=e102]
            - paragraph [ref=e103]:
              - text: We have conducted three rounds of user research, with a total of 123 participants aged 65 and older. Our studies were conducted in the United States, Canada, Australia, Germany, and Japan over a period spanning almost 2 decades. (See summary of
              - link "findings from the early user research with older adults" [ref=e104] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/usability-seniors-improvements/
              - text: .)
            - list [ref=e105]:
              - listitem [ref=e106]:
                - text: "2001:"
                - strong [ref=e107]: Usability testing
                - text: of 17 websites with 44 older adults
              - listitem [ref=e108]:
                - text: "2013:"
                - strong [ref=e109]: Usability testing
                - text: of 29 websites with 31 older adults
              - listitem [ref=e110]:
                - text: "2018–19:"
                - list [ref=e111]:
                  - listitem [ref=e112]:
                    - strong [ref=e113]: Usability testing
                    - text: of 12 websites and 6 apps with 18 older adults
                  - listitem [ref=e114]:
                    - strong [ref=e115]: Focus groups
                    - text: to learn about older adults’ attitudes towards technology, with a total of 20 participants
                  - listitem [ref=e116]:
                    - strong [ref=e117]: Contextual inquiry
                    - text: study where we observed 10 older adults interacting with websites, mobile apps, and tablet apps during a technology help session at a center for adults 65+
            - paragraph [ref=e118]:
              - text: Our
              - strong [ref=e119]: qualitative research sessions
              - text: "used sites and apps from a variety of genres, including:"
            - list [ref=e120]:
              - listitem [ref=e121]: Ecommerce (Amazon, Target, Whole Foods, Home Depot, Instacart, Maytag)
              - listitem [ref=e122]: Health (WebMD, Mayo Clinic, Center for Disease Control, rxlist.com)
              - listitem [ref=e123]: Banking (Chase, Charles Schwab)
              - listitem [ref=e124]: Government (National Institute of Health, Medicare.gov, Government of Canada)
              - listitem [ref=e125]: Tourism and travel (National Parks Service, Airbnb, United Airlines)
              - listitem [ref=e126]: Media and entertainment (Spotify, Apple Podcasts)
              - listitem [ref=e127]: News (NPR, Washington Post, Globe and Mail, Canadian Broadcasting Company)
              - listitem [ref=e128]: Social media (Facebook, Twitter)
            - heading "Defining “Older Adult”" [level=2] [ref=e129]
            - paragraph [ref=e130]:
              - text: "We use a simple definition: older adults are users aged"
              - strong [ref=e131]: 65 years
              - text: or older. We had no upper end, though the oldest participant in our research was 89 years old.
            - paragraph [ref=e132]:
              - text: Of course, this age range is a simplification. It’s not as if people change all their behaviors on their 65th birthday. The human-aging process starts when you turn 20; people in their 40s already have sufficiently reduced eyesight to require somewhat
              - link "larger font sizes" [ref=e133] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/let-users-control-font-size/
              - text: than eagle-eyed designers in their 20s.
            - paragraph [ref=e134]:
              - text: Our testing with middle-aged users has shown that
              - link "between the ages of 25 and 60" [ref=e135] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/middle-aged-web-users/
              - text: people's ability to use websites
              - strong [ref=e136]: declines by 0.8% per year
              - text: .
            - paragraph [ref=e137]:
              - text: On one hand side, we need to consider the impacts of human aging on usability long before age 65. However, on the other hand, in some contexts, 65 is too young to be considered an older adult. As we live longer, people in many countries retire later in life. In our most recent round of research, we mainly recruited study participants who were
              - strong [ref=e138]: at least 70 years old
              - text: .
            - heading "Changes Over Time" [level=2] [ref=e139]
            - paragraph [ref=e140]:
              - text: Since we first conducted usability studies with older adults 18 years ago, both the digital landscape and the characteristics of older adults have changed. (While common prejudice might suggest that older adults are slow to change, there have also been substantial changes in the findings since our
              - link "follow-up user research with adults ages 65+" [ref=e141] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/usability-seniors-improvements/
              - text: in 2013.) Older users are growing skilled at using the internet and apps. Their expectations for digital products are evolving and the devices that they use to access the internet have changed.
            - heading "A Changing Group of Older Users" [level=3] [ref=e142]
            - paragraph [ref=e143]:
              - text: The Baby Boomer generation is now reaching retirement age. This generation, born between 1946 and 1964, is far more likely than past generations of older adults to have had more substantial experience with information technology. In years past, very few of the older adults we recruited for our studies had used computers during their working careers. In our most recent study many older adults had used computers and the internet at work for years before retiring. Although
              - link "technical proficiency among all users" [ref=e144] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/computer-skill-levels/
              - text: is fairly limited, digital literacy among older adults is rising. Because of this higher level of digital literacy, today’s older adults exhibit very different patterns of behavior than cohorts we studied in our past research.
            - paragraph [ref=e145]:
              - text: When we conducted research with adults ages 65+ in 2001, we observed that many participants were apprehensive and hesitant in their behavior online. Today’s older users are more confident and more likely to adapt their actions online to avoid common annoyances such as
              - link "irritating advertisements" [ref=e146] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/annoying-ads-cost-business/
              - text: ","
              - link "time-wasting apps" [ref=e147] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/device-vortex/
              - text: ", and services that collect too much personal data. Some of the"
              - strong [ref=e148]: behavioral changes
              - text: that reflect
              - strong [ref=e149]: older users’ increasing digital literacy
              - text: "include:"
            - list [ref=e150]:
              - listitem [ref=e151]:
                - strong [ref=e152]: Installing ad blockers
                - text: on their computers to avoid “pop-up ads” and “especially the ads that play sound music”
              - listitem [ref=e153]:
                - strong [ref=e154]: Modifying search behavior
                - text: to skip sponsored results and advertisements
                - text: One participant noted that “I’ve learned to bypass those but it took a while.”
              - listitem [ref=e155]:
                - strong [ref=e156]: Uninstalling time-consuming apps
                - text: One 85-year-old study participant said that she uninstalled most of the games from her phone because “that stuff would waste my time… You can waste a lot of time that way.”
              - listitem [ref=e157]:
                - strong [ref=e158]: Deleting accounts
                - text: with services that collected too much personal data
            - heading "New Technology Changes Older Users’ Lives Online" [level=3] [ref=e159]
            - paragraph [ref=e160]:
              - text: In our first and second rounds of research, we conducted sessions using only desktop websites. In our most recent research, we gave participants tasks to complete on desktop, tablets, and mobile phones, using both the web and device-specific apps.
              - link "Social media" [ref=e161] [cursor=pointer]:
                - /url: https://www.nngroup.com/reports/social-media-user-experience/
              - text: is an increasingly important piece of our lives online, so we also studied how older adults use different social-media outlets.
            - paragraph [ref=e162]: "Here are some of the reasons the participants in our research use computer technology:"
            - heading "Why Older Adults Use the Internet" [level=4] [ref=e163]
            - paragraph [ref=e164]: Users in our studies used the internet to pursue their interests, follow current events, manage money, shop, research topics, and stay in touch with friends and family. Many commented positively on how the internet had helped them live better lives. One 87-year-old study participant said “going online has made me feel so much more independent.”
            - list [ref=e165]:
              - listitem [ref=e166]: “I use the internet to follow local and national news.”
              - listitem [ref=e167]: “I look up podcasts on things that I’m interested in, like travel or volunteering or film festivals.”
              - listitem [ref=e168]: “I pay all of my bills online. Everything is in one place.”
              - listitem [ref=e169]: “I order groceries online sometimes. I usually go and pick them up from the store but I’m thinking about having them delivered.”
              - listitem [ref=e170]: “I like that on the web you can be solitary and still feel a kinship to people. You can be a solitary socialite.”
            - heading "Why Older Users Use Smartphones" [level=4] [ref=e171]
            - paragraph [ref=e172]:
              - text: Smartphone adoption is rapidly rising among older adults. From
              - link "2011 to 2016" [ref=e173] [cursor=pointer]:
                - /url: https://www.pewinternet.org/2017/05/17/technology-use-among-seniors/
              - text: ", smartphone ownership among people over 65 quadrupled. Older adults in our study used their phones to keep track of events, research information, enjoy hobbies, and to stay connected with loved ones."
            - list [ref=e174]:
              - listitem [ref=e175]: “My phone is partially a calendar and day planner to me. I keep track of a lot of events on here.”
              - listitem [ref=e176]: “I have a gardening app on my phone. I can take a picture of a plant in my garden and the app will identify what it is.”
              - listitem [ref=e177]: “I like to find new restaurants to try.”
              - listitem [ref=e178]: “I planned an entire vacation to Italy on my phone!”
              - listitem [ref=e179]: “I use Google Maps to get directions if I’m going somewhere new.”
            - heading "How Older Users Use Social Media" [level=4] [ref=e180]
            - paragraph [ref=e181]:
              - text: Older users primarily use social media to stay in touch with friends and family. Most of the older adults we observed preferred to browse through their social media accounts and only rarely shared content. Interesting,
              - link "visually pleasing" [ref=e182] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/aesthetic-usability-effect/
              - text: ", and"
              - link "highly accessible content" [ref=e183] [cursor=pointer]:
                - /url: https://www.nngroup.com/reports/how-to-conduct-usability-studies-accessibility/
              - text: was most likely to be shared online by this age group.
            - list [ref=e184]:
              - listitem [ref=e185]: “My family lives all over the country but they’re all on Facebook. I use it to keep in touch.”
              - listitem [ref=e186]: “I use it [my phone] to check in with my kids. They’re on Instagram so I am too.”
              - listitem [ref=e187]: “Sometimes I post pictures of places I visit to Instagram.”
              - listitem [ref=e188]: “News stories usually pop up for me on Facebook. I use it to follow different news sources.”
            - heading "Usability Challenges for Older Users" [level=2] [ref=e189]
            - paragraph [ref=e190]:
              - text: "Time takes its toll as we get older. Hearing, vision, and manual dexterity decline as we age. Many digital products fail to take these changing needs into account: interfaces feature small text, poor color contrast, and tiny targets. Inaccessible design choices irritate users of all ages — we recently observed that small type caused problems and drew complaints"
              - link "even among teenage users" [ref=e191] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/usability-of-websites-for-teenagers/
              - text: . The design choices that irritate younger users create substantial barriers to access for older ones.
            - heading "Small Font Sizes and Small Targets" [level=3] [ref=e192]
            - paragraph [ref=e193]:
              - text: Sites and apps designed by and for young people are often inaccessible for older users. As one study participant observed, “the internet is unfriendly to people with bad eyesight.”
              - link "Readability" [ref=e194] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/legibility-readability-comprehension/
              - text: has remained an issue for seniors throughout all our studies over the years. Websites and apps with
              - strong [ref=e195]: tiny type
              - text: are common. Interactive elements such as buttons,
              - link "dropdowns" [ref=e196] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/drop-down-menus/
              - text: ", and links are often displayed at a small size that is difficult for older users to click on or tap. Although older users found applications on mobile to be convenient, readability challenges on these devices were significant."
              - link "Interface text" [ref=e197] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/interface-copy-decision-making/
              - text: on mobile apps was often too small and
              - link "lightly colored" [ref=e198] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/low-contrast/
              - text: for older adults to read comfortably.
            - heading "Inflexible and Unforgiving Interfaces" [level=3] [ref=e199]
            - paragraph [ref=e200]: Interfaces in websites and apps are often inflexible and unforgiving of errors. Many sites and apps accepted user inputs in only one form and participants were frustrated by this narrow range of interaction. As one participant operated a finicky date and time selector on her iPad she said “This is so frustrating! Why won’t they [the app designers] just let me type the time or say it?”
            - paragraph [ref=e201]:
              - text: Older users
              - strong [ref=e202]: make more mistakes
              - text: than younger users do. Study participants often commented on errors, saying “I fat-fingered that one” or “if only I could spell.” (It’s a classic finding in usability research that
              - link "users blame themselves" [ref=e203] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/quality-assurance-ux/
              - text: ", but it’s more appropriate for us to assign the blame to bad design that’s insufficiently accommodating of the way real humans behave.) In our studies we often saw users thwarted due to simple query typos and punished for entering hyphens or parentheses in telephone or credit-card numbers."
            - paragraph [ref=e204]:
              - text: Further, older users often had problems reading
              - link "error messages" [ref=e205] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/error-message-guidelines/
              - text: ", either because the wording was obscure or imprecise, or the message’s placement on the screen was easily overlooked among a profusion of other design elements. When older users encounter error handling, simplicity is even more important than usual. Focus on"
              - link "the error" [ref=e206] [cursor=pointer]:
                - /url: https://www.nngroup.com/articles/errors-forms-design-guidelines/
              - text: ", explain it clearly, and make it as easy as possible to fix."
            - heading "Exclusion from Online Content" [level=3] [ref=e207]
            - paragraph [ref=e208]: "Older users often correctly felt that websites and apps were not designed with consideration for their needs and interests. One participant said that he felt “left out” of the online world because it was created “with someone very different than me in mind.” Another observed:"
            - blockquote [ref=e209]:
              - paragraph [ref=e210]: “You look at things that are on the internet and it’s skewed towards not my demographic. The younger people, this is their medium. People my age did not grow up with it. People my age are not in charge of it. Online, there’s a quest to be cool and old people are not necessarily cool.”
            - paragraph [ref=e211]: Our recent research shows that digital products still discriminate against older adults. Content written for and by older people is difficult to find — when this content is available, it often treats older adults as a niche interest group rather than a diverse and growing demographic. By embracing both accessible design and an inclusive content strategy, online businesses can vastly expand the amount of business that they generate from this population.
            - heading "Full Research Report" [level=2] [ref=e212]
            - paragraph [ref=e213]:
              - text: The full usability report with
              - link "87 design guidelines for targeting seniors (users ages 65+)" [ref=e214] [cursor=pointer]:
                - /url: https://www.nngroup.com/reports/senior-citizens-on-the-web/
              - text: is available for download.

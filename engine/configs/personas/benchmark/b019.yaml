background_narrative: 서울 인근 소규모 문화센터에서 10년째 공예·뜨개질 수업을 운영 중인 강사로, 매 시즌 초급·중급·심화 3개
  반을 동시에 진행한다. 수강 신청은 지금도 전화와 카카오톡이 주 수단이며, 폼 도구는 옆에서 누군가 직접 알려줘야만 겨우 쓸 수 있는 수준이다.
  새로운 소프트웨어를 배우는 것에 거부감이 크고, 기존 방식이 다소 불편해도 익숙한 것을 계속 고수하는 편이다.

background_narrative: 'Camila launched a small HR consulting firm 18 months ago with
  a college friend — she handles biz dev and ops while her co-founder manages client
  delivery. She''s a gut-feel operator: if a tool takes more than 20 minutes to figure
  out, she closes the tab and falls back on whatever she used before. Her Notion workspace
  has 40+ half-finished pages, her inbox is her to-do list, and she''s sent three
  separate ''we need a proper system'' WhatsApp messages to her co-founder this month
  without following up on any of them.'

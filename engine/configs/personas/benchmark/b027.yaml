    신규 클라이언트가 첫 세션 전에 필요한 모든 정보를 빠짐없이 제출하도록 하고 — 동시에 폼의 외관이 '1인 코치의 급조된 설문'이 아닌 '전문
    실무자의 온보딩 프로세스'처럼 보이게 해 클라이언트의 초기 신뢰를 확보한다

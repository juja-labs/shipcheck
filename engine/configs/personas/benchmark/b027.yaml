background_narrative: Renata는 캐나다 토론토에서 5년째 1인 회복 코칭 실무를 운영하며, 화상통화와 암호화 메시지 앱을 통해
  8~12명의 클라이언트를 동시에 관리한다. 클라이언트 기밀 유지에 극도로 신중하지만, 막상 본인의 인테이크 프로세스는 2021년에 한 오후 만에
  급조한 Google Forms 설문지를 아직 쓰고 있으며, 그 사실이 늘 마음 한켠에 걸린다. 이전에 새 도구로 갈아탔다가 예상보다 시간과 돈을
  더 쓴 경험이 있어, 현재 도구가 불만족스러워도 바꾸는 결정을 최대한 미루는 편이다.

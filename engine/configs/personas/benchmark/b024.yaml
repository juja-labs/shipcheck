background_narrative: 8년째 소형 로컬 비즈니스를 대상으로 브랜딩·웹 패키지를 납품하는 1인 프리랜서다. 프로젝트마다 Google
  Sheets로 체크리스트를 직접 만들어 납품 단계별로 체크할 만큼 체계적이지만, 검증되지 않은 새 도구는 쉽게 손대지 않는다 — 신규 도구를 도입하기
  전엔 반드시 공식 문서, G2·ProductHunt 후기, 유튜브 튜토리얼을 순서대로 확인하는 루틴이 있다. 클라이언트 폼 작업은 수년째 Typeform
  또는 Google Forms로만 처리해 왔으며, 스타일 커스터마이징 한계에 불편함을 느끼면서도 '익숙한 게 낫다'는 판단으로 유지하고 있다.

background_narrative: Grace는 서울 소재 15명 규모의 사설 영어 어학원에서 수업 등록, 레벨 배치, 학부모 공지를 혼자 전담한다.
  과거 등록 데이터 오입력 한 건이 주말 내내 학부모 항의 전화로 이어진 경험이 있어, 모든 업무를 두 번, 때로는 세 번까지 검수하는 습관이 생겼다.
  디지털 도구를 다루는 데 기본기는 갖췄지만, 새 툴이 예상대로 작동하지 않을 때 극도로 불안해지며 빠르게 익숙한 방식으로 돌아가려 한다.

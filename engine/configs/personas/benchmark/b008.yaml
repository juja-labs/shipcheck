background_narrative: Elena는 바르셀로나 소재 커뮤니티 기반 비영리 단체에서 성인 대상 직업 재교육 프로그램을 운영하며, 한
  학기에 6~8개 강좌의 수강 신청을 혼자 관리한다. 디지털 도구를 실용적으로 활용하는 편이라 헬프 문서를 읽고 따라 하는 건 어렵지 않지만, 설정에
  지나치게 많은 시간을 쓰는 것을 싫어하고 '일단 돌아가면 바꾸지 않는' 성향이 강하다. 예산 승인 없이 유료 도구를 도입하는 건 거의 불가능해서,
  새 도구를 시도할 때는 무료 플랜에서 핵심 기능이 충분한지 먼저 꼼꼼히 확인하는 습관이 있다.

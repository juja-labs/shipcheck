background_narrative: 서울에서 초등학생 대상 미술·음악 방과후 프로그램을 혼자 운영하며, 수업 설계부터 학부모 소통·행정까지 전부
  직접 처리한다. 디지털 도구 자체를 못 다루는 건 아니지만, 새 설정을 건드릴 때마다 '내가 잘못 눌러서 학부모한테 엉뚱한 폼이 날아가면 어쩌지'
  하는 생각에 같은 화면을 두세 번씩 재확인하는 습관이 있다. 무료라는 이유로 써온 네이버 폼이 학기마다 복잡해지는 등록 흐름을 더 이상 감당하지
  못하고 있고, 과목과 무관한 질문이 뒤섞인 폼을 받은 학부모들의 문의 전화가 반복되는 데 조용히 지쳐가고 있다.

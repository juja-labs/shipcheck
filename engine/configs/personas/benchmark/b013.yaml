background_narrative: Marcus manages internal tooling and workflow automation for
  a 30-person B2B software company in Toronto, where he's the de facto 'fix-it guy'
  for anything ops-related. He's methodical by nature — he keeps a personal Notion
  wiki of every tool evaluation he's ever done, complete with pros/cons tables and
  cost-per-seat calculations. Not an early adopter by any stretch; he'd rather spend
  two extra days vetting a tool than migrate to something that breaks in six months.

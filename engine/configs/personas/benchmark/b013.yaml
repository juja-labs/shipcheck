  primary_goal: '팀이 현재 쓰고 있는 폼 빌더를 대체할 수 있는지 검증하기 위해 두
    가지 핵심 폼을 재현해본다: (1) 고객 온보딩 인테이크 — 7단계 조건 분기(직무 →
    팀 규모 → 유즈케이스 → 기능 우선순위), (2) 주간 내부 운영 체크인 — 응답이
    Google Sheet에 자동 기록되고 Zapier로 Slack 알림. 조건 분기 깊이, 기본 제공
    통합, 무료 티어에서 프로덕션 운영 가능 여부를 확인해야 한다.'
  prior_tools:

background_narrative: 'Derek teaches non-credit professional development courses at
  a mid-sized community college in Lagos, Nigeria, where enrollment cycles are chaotic
  — students sign up for the wrong course level, submit incomplete prerequisite info,
  or register for time slots that conflict with their shift schedules. He''s loud,
  opinionated, and quick to publicly complain on educator Facebook groups when a tool
  wastes his time. His tech comfort level is practical but shallow: he can follow
  step-by-step instructions but gets visibly frustrated the moment a UI doesn''t behave
  the way he expects, and he has zero patience for reading documentation.'

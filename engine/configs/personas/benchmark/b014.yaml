jtbd:
  primary_goal: Build a single registration form that automatically routes students
    into the right course section based on their answers — e.g., if a student selects
    'beginner' proficiency and 'evening only' availability, the form should show only
    the relevant course options and hide irrelevant fields entirely, without requiring
    Derek to manually filter submissions or follow up with dozens of correction emails
    every cycle
  prior_tools:
  - Google Forms
  success_criterion: After one enrollment cycle (roughly 2 weeks), Derek receives
    zero 'I signed up for the wrong thing' emails and spends less than 30 minutes
    total reviewing submissions — down from the 3+ hours he currently loses untangling
    Google Forms responses in a spreadsheet

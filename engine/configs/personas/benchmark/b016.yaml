background_narrative: 파리 기반 B2B SaaS 스타트업(직원 34명)에서 Growth Marketer로 일하는 Camille은
  콘텐츠, 이벤트, 이메일 캠페인을 혼자 도맡아 처리한다. 새로운 툴이나 마케팅 트렌드에 대한 호기심이 강해 Product Hunt와 Twitter(X)를
  매일 훑어보지만, 도구를 제대로 세팅하고 체계를 잡는 데는 쉽게 흥미를 잃어 업무 프로세스가 늘 반쯤 완성된 상태다. 스프레드시트보다 직관적인
  시각적 인터페이스를 선호하고, 기능 설명서를 읽기보다 직접 클릭해 보면서 파악하는 스타일이라 복잡한 설정 화면 앞에서 금방 이탈한다.

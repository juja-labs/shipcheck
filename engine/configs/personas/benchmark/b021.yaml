background_narrative: 서울 외곽의 소규모 다문화 교육센터에서 이주민 대상 한국어 생활교육 및 분기별 지역 워크숍을 운영한다. 행정
  업무는 '한 번 써봤고 크게 불편하지 않았던 툴'로 처리하는 편이며, 구글 폼이 불편해도 익숙하다는 이유만으로 수년째 쓰고 있다. 새 소프트웨어를
  열어봤다가 처음 화면이 복잡해 보이면 즉시 닫고 동료에게 '이거 써봤어요?'라고 묻는 타입으로, 도구 선택의 90%가 주변 추천과 첫인상에서 결정된다.
